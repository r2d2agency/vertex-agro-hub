# ============================================================================
# docker-compose para desenvolvimento local do frontend
# Em produção no EasyPanel: crie um App do tipo "App" apontando para o repo
# do frontend; o EasyPanel constrói o Dockerfile automaticamente.
# ============================================================================
services:
  web:
    build:
      context: .
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
        VITE_APP_NAME: "Vertex Agro"
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      API_PROXY_TARGET: ${API_PROXY_TARGET:-http://localhost:4000}
    restart: unless-stopped
